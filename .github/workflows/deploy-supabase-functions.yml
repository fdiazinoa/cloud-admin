name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - supabase/config.toml
      - supabase/functions/**
      - .github/workflows/deploy-supabase-functions.yml
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy HelpDesk functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"

      - name: Deploy inbound email processor
        run: supabase functions deploy process-inbound-email --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy integration settings saver
        run: supabase functions deploy save-integration-settings --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy support reply sender
        run: supabase functions deploy send-support-reply --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
